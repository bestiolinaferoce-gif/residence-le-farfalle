<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160" role="img" aria-label="Bandiera Blu 2026">
  <title>Bandiera Blu 2026</title>
  <desc>Badge compatto Bandiera Blu 2026 — Isola di Capo Rizzuto.</desc>

  <defs>
    <radialGradient id="bbcSea" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0e5a8a"/>
      <stop offset="60%" stop-color="#0a3d62"/>
      <stop offset="100%" stop-color="#062a44"/>
    </radialGradient>
    <linearGradient id="bbcGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0c75a"/>
      <stop offset="100%" stop-color="#a87f2a"/>
    </linearGradient>
    <path id="bbcArcTop" d="M 28 80 A 52 52 0 0 1 132 80" fill="none"/>
    <path id="bbcArcBottom" d="M 32 86 A 48 48 0 0 0 128 86" fill="none"/>
