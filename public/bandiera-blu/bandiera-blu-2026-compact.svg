  <circle cx="80" cy="80" r="76" fill="url(#bbcSea)"/>
  <circle cx="80" cy="80" r="70" fill="none" stroke="url(#bbcGold)" stroke-width="2"/>
  <circle cx="80" cy="80" r="62" fill="#0a4570" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.35"/>

  <text font-family="Georgia, serif" font-size="9" font-weight="700" fill="#f4d27a" letter-spacing="1.5">
