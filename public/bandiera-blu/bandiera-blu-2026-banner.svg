<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120" role="img" aria-label="Soggiorni in zona Bandiera Blu 2026 — Isola di Capo Rizzuto">
  <title>Bandiera Blu 2026 — Banner</title>
  <desc>Banner orizzontale che segnala il riconoscimento Bandiera Blu 2026.</desc>

  <defs>
    <linearGradient id="bbBnSea" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#062a44"/>
      <stop offset="50%" stop-color="#0a3d62"/>
      <stop offset="100%" stop-color="#0e5a8a"/>
    </linearGradient>
    <linearGradient id="bbBnGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0c75a"/>
      <stop offset="100%" stop-color="#a87f2a"/>
    </linearGradient>
    <radialGradient id="bbBnBadgeSea" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0e5a8a"/>
      <stop offset="100%" stop-color="#062a44"/>
    </radialGradient>
  </defs>

  <!-- Background pill -->
  <rect x="0" y="0" width="520" height="120" rx="60" fill="url(#bbBnSea)"/>
  <rect x="3" y="3" width="514" height="114" rx="57" fill="none" stroke="url(#bbBnGold)" stroke-width="1.5"/>

  <!-- Onde decorative leggere sullo sfondo -->
  <g stroke="#f4d27a" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.18">
    <path d="M 130 90 q 14 -8 28 0 t 28 0 t 28 0 t 28 0 t 28 0 t 28 0 t 28 0 t 28 0"/>
    <path d="M 130 100 q 12 -6 24 0 t 24 0 t 24 0 t 24 0 t 24 0 t 24 0 t 24 0 t 24 0 t 24 0"/>
  </g>

  <!-- Mini badge a sinistra -->
  <g transform="translate(60,60)">
    <circle r="46" fill="url(#bbBnBadgeSea)"/>
    <circle r="42" fill="none" stroke="url(#bbBnGold)" stroke-width="1.5"/>
    <text y="-12" font-family="Georgia, serif" font-size="7.5" font-weight="700" fill="#f4d27a" text-anchor="middle" letter-spacing="1.5">★ BANDIERA BLU ★</text>
    <text y="10" font-family="Georgia, serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle">2026</text>
    <path d="M -22 22 q 5 -3 11 0 t 11 0 t 11 0 t 11 0" stroke="#f4d27a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Testo principale a destra -->
  <text x="130" y="50" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#ffffff">
    Soggiorni in zona <tspan fill="#f4d27a" font-weight="800">Bandiera Blu</tspan>
  </text>
  <text x="130" y="76" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="500" fill="#e6e9ee" letter-spacing="0.4">
    Isola di Capo Rizzuto • Calabria 2° in Italia • 27 spiagge premiate
  </text>
</svg>
